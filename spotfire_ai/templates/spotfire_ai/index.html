{% load static %}
<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotfire Report — 생산/설비 이상 현황</title>

  <script>
    (function() {
      var saved = localStorage.getItem("sf-theme");
      var preferred = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", saved || preferred);
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <link rel="stylesheet" href="{% static 'spotfire_ai/css/dashboard.css' %}">
  <style>
    /* sf-detail 이 콘텐츠 크기만큼 늘어나고 sf-content 가 전체 스크롤을 담당 */
    .sf-content       { overflow-y: auto !important; }
    .sf-detail        { flex: none !important; overflow: visible !important; height: auto !important; }
    .sf-detail__body  { flex: none !important; overflow: visible !important; min-height: 0; }
    #rawDataPanel     { overflow: visible !important; }
    #topDataPanel     { overflow: visible !important; }
    #topRawPanel      { overflow: visible !important; }
    /* rawdata 테이블 자체는 최대 높이 + 스크롤 유지 */
    #rawDataPanel .sf-table-wrapper { max-height: 500px; overflow-y: auto; }
    #topRawPanel  .sf-table-wrapper { max-height: 400px; overflow-y: auto; }

    /* ── Page Tab Bar (하단, Spotfire 스타일) ── */
    .sf-pagetab-bar {
      flex-shrink: 0;
      height: 36px;
      background: var(--sf-surface);
      border-top: 1px solid var(--sf-border);
      display: flex;
      align-items: flex-end;
      padding: 0 12px;
      gap: 0;
      box-shadow: 0 -1px 4px rgba(0,0,0,.04);
    }
    .sf-pagetab-list {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 100%;
    }
    .sf-pagetab {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 30px;
      padding: 0 14px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      color: var(--sf-text-muted);
      text-decoration: none;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      background: transparent;
      cursor: pointer;
      transition: background var(--sf-transition), color var(--sf-transition),
                  border-color var(--sf-transition);
      white-space: nowrap;
      position: relative;
      bottom: -1px;
    }
    .sf-pagetab:hover {
      background: var(--sf-surface-2);
      color: var(--sf-text);
    }
    .sf-pagetab--active {
      background: var(--sf-surface);
      color: var(--sf-primary);
      font-weight: 700;
      border-color: var(--sf-border);
      border-bottom-color: var(--sf-surface);
    }
    .sf-pagetab--active svg { stroke: var(--sf-primary); }
  </style>

  <meta name="csrf-token" content="{{ csrf_token }}">

  <script>
    window.SF_URLS = {
      reportData   : "{% url 'spotfire_ai:api_report_data' %}",
      clickDetail  : "{% url 'spotfire_ai:api_click_detail' %}",
      filterOptions: "{% url 'spotfire_ai:api_filter_options' %}",
      askAi        : "{% url 'spotfire_ai:api_ask_ai' %}",
    };
  </script>
</head>

<body class="sf-body">
<div class="sf-layout" id="sfLayout">

  {% include "spotfire_ai/partials/sidebar.html" %}

  <main class="sf-main" id="sfMain">

    <header class="sf-topbar">
      <div class="sf-topbar__left">
        <button class="sf-topbar__menu-btn" id="sidebarToggleBtn" title="sidebar 열기/닫기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="sf-topbar__brand">
          <span class="sf-topbar__logo">⬡</span>
          <h1 class="sf-topbar__title">생산/설비 이상 현황</h1>
        </div>
      </div>
      <div class="sf-topbar__right">
        <div class="sf-topbar__control">
          <span class="sf-topbar__label">Y축</span>
          <select id="yFieldSelect" class="sf-select-sm">
            <option value="cnt" selected>Count</option>
            <option value="ratio">Ratio (%)</option>
          </select>
        </div>

        <button class="sf-theme-btn" id="themeToggleBtn" title="테마 전환">
          <svg class="sf-theme-btn__icon sf-theme-btn__icon--moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="sf-theme-btn__icon sf-theme-btn__icon--sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>

        <button class="sf-copilot-toggle-btn" id="copilotToggleBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2M9 9a1 1 0 0 0-1 1v4a1 1 0 0 0 2 0v-4a1 1 0 0 0-1-1m6 0a1 1 0 0 0-1 1v4a1 1 0 0 0 2 0v-4a1 1 0 0 0-1-1z"/>
          </svg>
          AI Copilot
        </button>
      </div>
    </header>

    <div class="sf-content">

      <section class="sf-chart-row">
        <div class="sf-chart-card">
          <div class="sf-chart-card__header">
            <span class="sf-chart-card__badge sf-chart-card__badge--m">M</span>
            <span class="sf-chart-card__title">Monthly</span>
          </div>
          <div id="chartM" class="sf-chart-canvas"></div>
          <div class="sf-chart-card__loading" id="loadingM"><div class="sf-spinner"></div></div>
        </div>
        <div class="sf-chart-card">
          <div class="sf-chart-card__header">
            <span class="sf-chart-card__badge sf-chart-card__badge--w">W</span>
            <span class="sf-chart-card__title">Weekly</span>
          </div>
          <div id="chartW" class="sf-chart-canvas"></div>
          <div class="sf-chart-card__loading" id="loadingW"><div class="sf-spinner"></div></div>
        </div>
        <div class="sf-chart-card">
          <div class="sf-chart-card__header">
            <span class="sf-chart-card__badge sf-chart-card__badge--d">D</span>
            <span class="sf-chart-card__title">Daily</span>
          </div>
          <div id="chartD" class="sf-chart-canvas"></div>
          <div class="sf-chart-card__loading" id="loadingD"><div class="sf-spinner"></div></div>
        </div>
      </section>

      <div class="sf-context-bar" id="contextBar" style="display:none;">
        <span class="sf-context-bar__dot"></span>
        <span class="sf-context-bar__label">선택됨</span>
        <span class="sf-context-bar__badge" id="contextBadge"></span>
        <button class="sf-context-bar__clear" id="contextClearBtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          초기화
        </button>
      </div>

      <section class="sf-detail" id="sfDetail" style="display:none;">

        <div class="sf-detail__toolbar">
          <div class="sf-radio-group" role="group">
            <label class="sf-radio-label">
              <input type="radio" name="detailMode" value="raw" checked>
              <span class="sf-radio-indicator"></span>
              Rawdata
            </label>
            <label class="sf-radio-label">
              <input type="radio" name="detailMode" value="top">
              <span class="sf-radio-indicator"></span>
              Top Show
            </label>
          </div>

          <!-- ▼▼▼ 변경: topFieldSelect → topGroupSelect (고정 그룹 옵션, JS에서 동적 채움) ▼▼▼ -->
          <div class="sf-top-options" id="topOptions" style="display:none;">
            <span class="sf-topbar__label">집계 기준</span>
            <select id="topGroupSelect" class="sf-select-sm" style="min-width:240px;">
              <!-- dashboard.js _initTopGroupSelect() 에서 DOMContentLoaded 시 옵션이 채워짐 -->
            </select>
            <span class="sf-topbar__label">Top N</span>
            <input type="number" id="topNInput" class="sf-input-sm"
                   value="10" min="1" max="200" style="width:60px;">
          </div>
          <!-- ▲▲▲ 변경 끝 ▲▲▲ -->

          <span class="sf-detail__count" id="detailCount"></span>
        </div>

        <div class="sf-detail__loading" id="detailLoading" style="display:none;">
          <div class="sf-spinner"></div>
          <span>데이터 불러오는 중…</span>
        </div>

        <div class="sf-detail__body" id="detailBody">
          <div id="rawDataPanel">
            <div class="sf-table-wrapper">
              <table class="sf-table" id="rawTable">
                <thead id="rawTableHead"></thead>
                <tbody id="rawTableBody"></tbody>
              </table>
              <div class="sf-table-empty" id="rawTableEmpty" style="display:none;">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                  <path d="M3 3h18v18H3z"/><path d="M9 9h6m-6 3h6m-6 3h4"/>
                </svg>
                <p>데이터가 없습니다</p>
              </div>
            </div>
          </div>
          <div id="topDataPanel" style="display:none;">
            <div class="sf-top-layout" style="height:360px;">
              <div class="sf-top-layout__chart">
                <div id="chartTop" class="sf-top-chart"></div>
              </div>
              <div class="sf-top-layout__table">
                <div class="sf-table-wrapper sf-table-wrapper--top">
                  <table class="sf-table" id="topTable">
                    <thead id="topTableHead"></thead>
                    <tbody id="topTableBody"></tbody>
                  </table>
                </div>
              </div>
            </div>

            <!-- ▼ Top Show bar 클릭 시 해당 그룹의 Rawdata 표시 -->
            <div id="topRawPanel" style="display:none; margin-top:12px;">
              <div style="display:flex; align-items:center; gap:10px; padding:6px 0 8px; border-top:1px solid var(--sf-border); margin-top:4px;">
                <span style="font-size:11px; font-weight:600; color:var(--sf-text-muted); text-transform:uppercase; letter-spacing:.06em;">Raw Data</span>
                <span id="topRawBadge" style="font-size:11px; font-weight:700; color:var(--sf-primary); background:var(--sf-primary-soft); border:1px solid rgba(99,102,241,.3); border-radius:14px; padding:2px 10px;"></span>
                <span id="topRawCount" style="margin-left:auto; font-size:11px; color:var(--sf-text-muted);"></span>
                <button id="topRawCloseBtn" style="background:none; border:1px solid var(--sf-border); border-radius:6px; font-size:11px; font-family:inherit; cursor:pointer; color:var(--sf-text-muted); padding:3px 9px;" onclick="closeTopRaw()">닫기</button>
              </div>
              <div class="sf-table-wrapper" style="max-height:400px; overflow-y:auto;">
                <table class="sf-table" id="topRawTable">
                  <thead id="topRawTableHead"></thead>
                  <tbody id="topRawTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

      </section>

    </div><!-- /sf-content -->

    <!-- ▸ 하단 Page Tab Bar (Spotfire 스타일) -->
    <nav class="sf-pagetab-bar" id="sfPageTabBar">
      <div class="sf-pagetab-list">
        <a href="{% url 'spotfire_ai:index' %}" class="sf-pagetab sf-pagetab--active">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Interlock
        </a>
        <!-- 새 페이지 추가 시 여기에 <a> 태그 추가 -->
        <!-- <a href="{% url 'stoploss_ai:index' %}" class="sf-pagetab">
          <svg ...></svg>
          Stoploss
        </a> -->
      </div>
    </nav>

  </main>

  <aside class="sf-copilot" id="sfCopilot">
    <div class="sf-copilot__header">
      <div class="sf-copilot__header-left">
        <span class="sf-copilot__icon">⬡</span>
        <span class="sf-copilot__title">AI Copilot</span>
      </div>
      <div class="sf-copilot__header-right">
        <button class="sf-copilot__close-btn" id="copilotCloseBtn" title="닫기">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="sf-copilot__history" id="copilotHistory">
      <div class="sf-chat-msg sf-chat-msg--ai">
        <div class="sf-chat-msg__bubble">
          안녕하세요! 설비 이상 현황에 대해 질문해 주세요.<br><br>
          <span style="opacity:.7;">예) "상위 10개 설비는?" / "라인별 집계는?"</span>
        </div>
      </div>
    </div>

    <div class="sf-copilot__input-area">
      <div class="sf-copilot__context-hint" id="copilotContextHint" style="display:none;"></div>
      <div class="sf-quick-btns">
        <button class="sf-quick-btn" data-q="발생 건수 상위 10개 설비는?">🏆 Top 설비</button>
        <button class="sf-quick-btn" data-q="라인별 집계 결과를 보여줘">📊 라인별</button>
        <button class="sf-quick-btn" data-q="파라미터명별 발생 건수를 알려줘">📈 파라미터</button>
      </div>
      <div class="sf-copilot__input-row">
        <textarea
          id="aiInput"
          class="sf-copilot__textarea"
          placeholder="질문을 입력하세요… (Enter 전송)"
          rows="2"
        ></textarea>
        <button id="aiSendBtn" class="sf-copilot__send-btn" title="전송">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

</div>

<div class="sf-toast" id="sfToast" role="alert" aria-live="assertive"></div>

<script src="{% static 'spotfire_ai/js/dashboard.js' %}"></script>
</body>
</html>
