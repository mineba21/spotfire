{% comment %}stoploss_ai/partials/sidebar.html{% endcomment %}

<aside class="sf-sidebar" id="sfSidebar">

  <div class="sf-sidebar__header">
    <div class="sf-sidebar__brand">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" opacity=".7">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
      <span class="sf-sidebar__title">Filters</span>
    </div>
    <button class="sf-sidebar__collapse-btn" id="sidebarCollapseBtn" title="접기">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
  </div>

  <!-- Rank Limit -->
  <div class="sf-sidebar__section">
    <span class="sf-sidebar__section-label">Rank Limit</span>
    <div class="sf-rank-group">
      <div class="sf-rank-item">
        <span class="sf-rank-item__label">M</span>
        <input type="number" id="rankM" class="sf-rank-item__input" value="3" min="1" max="999">
      </div>
      <div class="sf-rank-item">
        <span class="sf-rank-item__label">W</span>
        <input type="number" id="rankW" class="sf-rank-item__input" value="3" min="1" max="999">
      </div>
      <div class="sf-rank-item">
        <span class="sf-rank-item__label">D</span>
        <input type="number" id="rankD" class="sf-rank-item__input" value="7" min="1" max="999">
      </div>
    </div>
  </div>

  <!-- Area (구 Line) -->
  <div class="sf-sidebar__section">
    <label class="sf-sidebar__section-label" for="filterArea">Area</label>
    <select id="filterArea" name="area" multiple class="sf-select">
      <option value="ALL" selected>ALL</option>
      {% for v in filter_options.areas %}
        <option value="{{ v }}">{{ v }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- SDWT Prod -->
  <div class="sf-sidebar__section">
    <label class="sf-sidebar__section-label" for="filterSdwtProd">SDWT Prod</label>
    <select id="filterSdwtProd" name="sdwt_prod" multiple class="sf-select">
      <option value="ALL" selected>ALL</option>
      {% for v in filter_options.sdwt_prods %}
        <option value="{{ v }}">{{ v }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- EQP Model -->
  <div class="sf-sidebar__section">
    <label class="sf-sidebar__section-label" for="filterEqpModel">EQP Model</label>
    <select id="filterEqpModel" name="eqp_model" multiple class="sf-select">
      <option value="ALL" selected>ALL</option>
      {% for v in filter_options.eqp_models %}
        <option value="{{ v }}">{{ v }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- EQP ID -->
  <div class="sf-sidebar__section">
    <label class="sf-sidebar__section-label" for="filterEqpId">EQP ID</label>
    <select id="filterEqpId" name="eqp_id" multiple class="sf-select">
      <option value="ALL" selected>ALL</option>
      {% for v in filter_options.eqp_ids %}
        <option value="{{ v }}">{{ v }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- PRC Group -->
  <div class="sf-sidebar__section">
    <label class="sf-sidebar__section-label" for="filterPrcGroup">PRC Group</label>
    <select id="filterPrcGroup" name="prc_group" multiple class="sf-select">
      <option value="ALL" selected>ALL</option>
      {% for v in filter_options.prc_groups %}
        <option value="{{ v }}">{{ v }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- Buttons -->
  <div class="sf-sidebar__footer">
    <button id="applyFilterBtn" class="sf-btn sf-btn--primary">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Apply Filter
    </button>
    <button id="resetFilterBtn" class="sf-btn sf-btn--ghost">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5.33"/></svg>
      Reset
    </button>
  </div>

</aside>
